<svg xmlns="http://www.w3.org/2000/svg" width="920" height="720" viewBox="0 0 920 720" font-family="'Archivo','Helvetica Neue',system-ui,sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#1B2A4A" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="loop" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#b8862b" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .eyebrow{font-size:10px;letter-spacing:.18em;text-transform:uppercase;fill:#9a8f7d;font-weight:700;font-family:'JetBrains Mono',monospace}
      .title{font-size:14px;font-weight:700;fill:#1B2A4A}
      .sub{font-size:10.5px;fill:#6b6456}
      .wire{fill:none;stroke:#b3aa96;stroke-width:1.5}
      .loop{fill:none;stroke:#b8862b;stroke-width:1.5;stroke-dasharray:5 3}
      .flow{font-size:9px;fill:#9a8f7d;font-family:'JetBrains Mono',monospace}
      .loopflow{font-size:9px;fill:#b8862b;font-family:'JetBrains Mono',monospace;font-weight:700}
    </style>
  </defs>

  <rect width="920" height="720" fill="#F3EDE1"/>
  <rect x="60" y="40" width="800" height="8" rx="2" fill="#D8452B"/>
  <text x="60" y="86" font-size="24" font-weight="800" fill="#1B2A4A">Suitcase — the agents</text>
  <text x="60" y="108" class="sub" font-size="12.5">Two modes share one retrieval stack. Ask reasons in a loop; Plan rates against hard constraints.</text>

  <!-- shared entry -->
  <rect x="360" y="132" width="200" height="50" rx="10" fill="#fff" stroke="#c9c0ad" stroke-width="1.2"/>
  <text x="460" y="153" class="title" text-anchor="middle">User request</text>
  <text x="460" y="170" class="sub" text-anchor="middle">"wheelchair trip to Rome"</text>

  <path class="wire" d="M360 157 L200 157 L200 210" marker-end="url(#a)"/>
  <path class="wire" d="M560 157 L720 157 L720 210" marker-end="url(#a)"/>
  <text x="250" y="150" class="flow">ASK mode</text>
  <text x="640" y="150" class="flow">PLAN mode</text>

  <!-- ============ LEFT: ASK graph (multi-agent, looping) ============ -->
  <rect x="40" y="200" width="380" height="470" rx="16" fill="#ece5d6" stroke="#c9c0ad" stroke-width="1.3"/>
  <text x="60" y="226" class="eyebrow">Ask · LangGraph multi-agent</text>

  <rect x="130" y="240" width="200" height="46" rx="9" fill="#dcebe0" stroke="#3f7d53" stroke-width="1.2"/>
  <text x="230" y="262" class="title" fill="#2c5a3c" text-anchor="middle">Clarify</text>
  <text x="230" y="277" class="sub" fill="#3f7d53" text-anchor="middle">enough to answer? else ask</text>

  <rect x="130" y="316" width="200" height="46" rx="9" fill="#dcebe0" stroke="#3f7d53" stroke-width="1.2"/>
  <text x="230" y="338" class="title" fill="#2c5a3c" text-anchor="middle">Planner</text>
  <text x="230" y="353" class="sub" fill="#3f7d53" text-anchor="middle">decide next: research or done</text>

  <rect x="130" y="392" width="200" height="46" rx="9" fill="#dcebe0" stroke="#3f7d53" stroke-width="1.2"/>
  <text x="230" y="414" class="title" fill="#2c5a3c" text-anchor="middle">Researcher</text>
  <text x="230" y="429" class="sub" fill="#3f7d53" text-anchor="middle">RAG / SQL retrieval</text>

  <rect x="130" y="468" width="200" height="46" rx="9" fill="#dcebe0" stroke="#3f7d53" stroke-width="1.2"/>
  <text x="230" y="490" class="title" fill="#2c5a3c" text-anchor="middle">Reflection</text>
  <text x="230" y="505" class="sub" fill="#3f7d53" text-anchor="middle">evidence sufficient?</text>

  <rect x="130" y="544" width="200" height="46" rx="9" fill="#d9e4f2" stroke="#2f6ca5" stroke-width="1.2"/>
  <text x="230" y="566" class="title" fill="#1e4f7d" text-anchor="middle">Writer</text>
  <text x="230" y="581" class="sub" fill="#2f6ca5" text-anchor="middle">cited answer</text>

  <!-- ask forward edges -->
  <path class="wire" d="M230 286 L230 314" marker-end="url(#a)"/>
  <path class="wire" d="M230 362 L230 390" marker-end="url(#a)"/>
  <path class="wire" d="M230 438 L230 466" marker-end="url(#a)"/>
  <path class="wire" d="M230 514 L230 542" marker-end="url(#a)"/>

  <!-- ask LOOPS (the multi-agent part) -->
  <!-- researcher -> planner (loop back up, on the left) -->
  <path class="loop" d="M130 415 L86 415 L86 339 L128 339" marker-end="url(#loop)"/>
  <text x="70" y="380" class="loopflow" text-anchor="middle" transform="rotate(-90 70 380)">gather → replan</text>
  <!-- reflection -> planner (replan loop, on the right) -->
  <path class="loop" d="M330 491 L374 491 L374 339 L332 339" marker-end="url(#loop)"/>
  <text x="392" y="415" class="loopflow" text-anchor="middle" transform="rotate(90 392 415)">not enough → replan</text>

  <!-- ============ RIGHT: PLAN pipeline (constraint-faithful) ============ -->
  <rect x="500" y="200" width="380" height="470" rx="16" fill="#ece5d6" stroke="#c9c0ad" stroke-width="1.3"/>
  <text x="520" y="226" class="eyebrow">Plan · constraint-faithful pipeline</text>

  <rect x="590" y="240" width="200" height="46" rx="9" fill="#dcebe0" stroke="#3f7d53" stroke-width="1.2"/>
  <text x="690" y="262" class="title" fill="#2c5a3c" text-anchor="middle">Extract requirements</text>
  <text x="690" y="277" class="sub" fill="#3f7d53" text-anchor="middle">constraint contract</text>

  <rect x="590" y="316" width="200" height="46" rx="9" fill="#d9e4f2" stroke="#2f6ca5" stroke-width="1.2"/>
  <text x="690" y="338" class="title" fill="#1e4f7d" text-anchor="middle">Retrieve</text>
  <text x="690" y="353" class="sub" fill="#2f6ca5" text-anchor="middle">real guide chunks (RAG)</text>

  <rect x="590" y="392" width="200" height="46" rx="9" fill="#f6ecd3" stroke="#b8862b" stroke-width="1.2"/>
  <text x="690" y="414" class="title" fill="#8a6114" text-anchor="middle">Rate each place</text>
  <text x="690" y="429" class="sub" fill="#b8862b" text-anchor="middle">code locks hard · LLM soft</text>

  <rect x="590" y="468" width="200" height="46" rx="9" fill="#dcebe0" stroke="#3f7d53" stroke-width="1.2"/>
  <text x="690" y="490" class="title" fill="#2c5a3c" text-anchor="middle">Assemble</text>
  <text x="690" y="505" class="sub" fill="#3f7d53" text-anchor="middle">day plan + "left out, why"</text>

  <!-- bank sidecar feeding the rater -->
  <rect x="808" y="392" width="56" height="46" rx="9" fill="#f6ddd2" stroke="#D8452B" stroke-width="1.1"/>
  <text x="836" y="411" class="sub" fill="#9c3420" text-anchor="middle" font-weight="700" font-size="10">Access</text>
  <text x="836" y="424" class="sub" fill="#9c3420" text-anchor="middle" font-weight="700" font-size="10">bank</text>
  <path class="wire" d="M806 415 L792 415" marker-end="url(#a)" stroke="#D8452B"/>

  <!-- plan forward edges -->
  <path class="wire" d="M690 286 L690 314" marker-end="url(#a)"/>
  <path class="wire" d="M690 362 L690 390" marker-end="url(#a)"/>
  <path class="wire" d="M690 438 L690 466" marker-end="url(#a)"/>

  <rect x="590" y="544" width="200" height="46" rx="9" fill="#fff" stroke="#c9c0ad" stroke-width="1.2"/>
  <text x="690" y="566" class="title" text-anchor="middle">Itinerary</text>
  <text x="690" y="581" class="sub" text-anchor="middle">boarding-pass plan</text>
  <path class="wire" d="M690 514 L690 542" marker-end="url(#a)"/>

  <!-- shared retrieval note -->
  <text x="460" y="632" class="eyebrow" text-anchor="middle">Both retrieve from the same grounded corpus</text>
  <rect x="330" y="642" width="260" height="30" rx="7" fill="#d9e4f2" stroke="#2f6ca5" stroke-width="1"/>
  <text x="460" y="661" class="sub" text-anchor="middle" font-size="10.5"><tspan font-weight="700" fill="#1e4f7d">OpenSearch</tspan> — 26-city guide corpus, embedded</text>
  <path class="wire" d="M330 438 L300 438 L300 657 L328 657" marker-end="url(#a)" stroke-dasharray="4 3"/>
  <path class="wire" d="M790 338 L820 338 L820 657 L592 657" marker-end="url(#a)" stroke-dasharray="4 3"/>
</svg>
